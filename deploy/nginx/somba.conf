# Somba&Teka — single-domain nginx reverse proxy
#
# Routes on ONE domain (no CORS needed):
#   /socket.io/  -> API (:3001)  WebSocket real-time transport
#   /api/        -> API (:3001)  REST auth (login/register/refresh)
#   everything   -> Web (:3000)  Next.js
#
# Put this at /etc/nginx/sites-available/somba.conf and symlink into
# sites-enabled. Replace yourdomain.com with your domain (or the droplet IP).

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # --- WebSocket (Socket.IO) --------------------------------------------
    # MUST come before the "/" block. The Upgrade/Connection headers are what
    # turn this into a real WebSocket instead of falling back to polling.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep long-lived sockets open
        proxy_send_timeout 3600s;
    }

    # --- REST API (one-shot auth) -----------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Next.js web app ---------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;         # Next HMR/dev only
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
