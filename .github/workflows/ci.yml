name: CI

on:
  push:
    branches: ['**']
    paths: ['api/**', 'web/**', '.github/workflows/ci.yml']
  pull_request:
    paths: ['api/**', 'web/**']

jobs:
  api:
    name: API (build + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run build
      # End-to-end realtime smoke test against a seeded SQLite DB. Start the
      # server and run the test in ONE step so the background process persists.
      - name: Seed + smoke test
        run: |
          npm run seed
          node dist/main.js &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/api/v1/health && break || sleep 1
          done
          npm run smoke
          STATUS=$?
          kill $SERVER_PID || true
          exit $STATUS

  web:
    name: Web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
